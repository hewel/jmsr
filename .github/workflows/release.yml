name: Build and Release
on:
  push:
    tags:
      - 'v*.*.*' # Triggers only on tags like v1.0.0, v1.2.3

jobs:
  changelog:
    name: Load Local Agent Release Notes
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      release_body: ${{ steps.release-notes.outputs.release_body }}
    steps:
      - uses: actions/checkout@v4

      - name: Load local agent release notes
        run: |
          body_file=".github/release-notes/${GITHUB_REF_NAME}.md"
          if [ ! -s "$body_file" ]; then
            echo "::error::Missing local-agent release notes at $body_file"
            exit 1
          fi
          IFS= read -r first_line < "$body_file"
          if [ "$first_line" != "## ${GITHUB_REF_NAME}" ]; then
            echo "::error::$body_file must start with an exact '## ${GITHUB_REF_NAME}' heading"
            exit 1
          fi
          delimiter="RELEASE_NOTES_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}"
          {
            echo "release_body<<$delimiter"
            cat "$body_file"
            echo "$delimiter"
          } >> "$GITHUB_OUTPUT"
  build:
    name: Build (${{ matrix.platform }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            artifact-name: linux
          - platform: windows-latest
            artifact-name: windows
          - platform: macos-latest
            artifact-name: macos
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: swatinem/rust-cache@v2
        with:
          workspaces: 'src-tauri'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Application
        run: bun tauri build

      - name: Upload Linux artifacts
        if: matrix.platform == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload Windows artifacts
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe

      - name: Upload macOS artifacts
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          path: |
            src-tauri/target/release/bundle/dmg/*.dmg

  arch-package:
    name: Build Arch package
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Install action runtime and package tooling
        run: |
          pacman -Syu --noconfirm nodejs git bun rust webkit2gtk-4.1 gtk3 libayatana-appindicator librsvg mpv

      - uses: actions/checkout@v4

      - name: Validate package version matches release tag
        run: |
          pkgver="$(sed -n 's/^pkgver=//p' packaging/arch/PKGBUILD)"
          test "v${pkgver}" = "${GITHUB_REF_NAME}"

      - name: Build package
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"
          su builder -c "cd '$GITHUB_WORKSPACE/packaging/arch' && makepkg --syncdeps --noconfirm"

      - name: Upload Arch artifact
        uses: actions/upload-artifact@v4
        with:
          name: arch-artifacts
          path: packaging/arch/*.pkg.tar.zst

  release:
    name: Create Release
    needs: [changelog, build, arch-package]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ needs.changelog.outputs.release_body }}
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
